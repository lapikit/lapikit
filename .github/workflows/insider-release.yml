name: Insider Release

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: 'lts/*'
  BUN_VERSION: 'latest'
  RELEASE_CHANNEL: insiders
  VERSION: 0.0.0

jobs:
  prerelease:
    name: Set Version
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      version_release: ${{ steps.set_version.outputs.version_release }}
      sha_short: ${{ steps.get_sha_version.outputs.sha_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: resolve version
        id: get_sha_version
        run: |
          echo "sha_version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: generate version
        id: set_version
        run: |
          sha_version="${{ steps.get_sha_version.outputs.sha_version }}"
          echo "version_release=${VERSION}-${RELEASE_CHANNEL}.${sha_version}" >> $GITHUB_OUTPUT

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: prerelease
    env:
      version_release: ${{ needs.prerelease.outputs.version_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: update .npmrc
        run: |
          echo "engine-strict=false" > ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: set insiders version in package.json
        run: |
          # Use jq to update version instead of npm version to avoid git issues
          jq --arg version "${{ env.version_release }}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: build package
        run: |
          bun run build

      - name: verify package
        run: |
          npm pack --dry-run

      - name: publish to npm
        run: |
          echo "Publishing version ${{ env.version_release }}"
          npm publish --tag ${{ env.RELEASE_CHANNEL }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
