name: 'Tag'

on:
  workflow_call:

jobs:
  tag-release:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1.2.2

      - name: install jq on env
        run: sudo apt-get install jq

      - name: install dependencies
        run: bun install

      - name: build
        run: |
          bun run build

      - name: get package version from package.json
        id: package-version
        run: |
          version=$(jq -r .version package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: add release notes to github release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          tag_name: lapikit@${{ steps.package-version.outputs.version }}
          body: |
            Read changelog: [https://lapikit.dev/docs/changelog](https://lapikit.dev/docs/changelog)

            Install this update:
            ```bash
            npm i -D lapikit@${{ steps.package-version.outputs.version }}
            ```

            Thank you for using Lapikit!
