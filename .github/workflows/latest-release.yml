name: Latest Release

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: 'lts/*'
  BUN_VERSION: 'latest'
  RELEASE_CHANNEL: public
  PACKAGE_NAME: lapikit

jobs:
  prerelease:
    name: Check Version
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version_release: ${{ steps.get_version.outputs.version_release }}
    steps:
      - uses: actions/checkout@v4

      - name: get local package version
        id: get_version
        run: |
          echo "PACKAGE_VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV
          echo "version_release=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

      - name: check if version exists on npm
        id: check
        run: |
          if npm view ${{ env.lapikit/lapikit }}@$PACKAGE_VERSION version > /dev/null 2>&1; then
            echo "Version $PACKAGE_VERSION already exists on NPM."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $PACKAGE_VERSION is new. Valid to publish."
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: prerelease
    if: needs.prerelease.outputs.should_publish == 'true'
    env:
      version_release: ${{ needs.prerelease.outputs.version_release }}
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: update .npmrc
        run: |
          echo "engine-strict=false" > ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: set github actions bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: verify package
        run: |
          npm pack --dry-run

      - name: publish to npm
        run: |
          echo "Publishing version ${{ env.version_release }}"
          npm publish --access ${{ env.RELEASE_CHANNEL }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  generate-release-notes:
    name: Tag
    needs: publish
    permissions:
      contents: write
    uses: ./.github/workflows/tag.yml
    secrets: inherit
